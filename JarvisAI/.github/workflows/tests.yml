name: JarvisAI CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  testes:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias essenciais
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn psutil pydantic pytest

      - name: Rodar testes unitarios
        run: pytest tests/ -v
